port: 7890
socks-port: 7891
mix-port: 7892
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
experimental:
  ignore-resolve-fail: true
hosts:
  # '*.clash.dev': 127.0.0.1
  # '.dev': 127.0.0.1
  # 'alpha.clash.dev': '::1'
profile:
  store-selected: true
  tracing: false
dns:
  enable: true
  listen: 0.0.0.0:1053
  default-nameserver:
  - 223.6.6.6
  ipv6: false
  enhanced-mode: redir-host
  use-hosts: true
  nameserver:
#   - dhcp://en0 # dns from dhcp
#   - dhcp://WLAN
#   - https://dns.rubyfish.cn/dns-query
  - 119.29.29.29
  - 223.6.6.6
#   - https://a.passcloud.xyz/dns-query
  fallback:
#   - https://a.passcloud.xyz/dns-query
  - tls://x.passcloud.xyz
#   - https://i.passcloud.xyz/dns-query
  - https://dns.rubyfish.cn/dns-query
#   - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: false
    ipcidr:
      - 0.0.0.0/8
      - 127.0.0.0/8
  nameserver-policy:
#     '+.ujn.edu.cn': '202.194.68.10'
#     'www.baidu.com': '114.114.114.114'
#     '+.internal.crop.com': '10.0.0.1'
clash-for-android:
  append-system-dns: false
  ui-subtitle-pattern: ^(\\U|\\u.{8})+?\s.*?\s|^.*?\s
#   ui-subtitle-pattern: ^.*(?:->\s)|^(\\U|\\u.{8})+?\s.*?\s|^.*?\s
proxies: ~
proxy-groups: ~
rules: ~
